# HYPERPLM — Alembic configuration
# The database URL is injected from the DATABASE_URL environment variable in
# migrations/env.py (never hardcoded here — CLAUDE.md rule 0).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# version_path_separator handled by Alembic defaults

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
